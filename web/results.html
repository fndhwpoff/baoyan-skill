<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成果中心 — 保研skill</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--t2:#6b7280;--p1:#4f46e5;--g1:#059669;--bdr:#e5e7eb;--r:16px;--sh:0 1px 3px rgba(0,0,0,0.04);--font:-apple-system,"Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text)}
.navbar{background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:0 28px;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:60px}
.nav-logo{font-weight:900;font-size:1.2rem;color:var(--p1);text-decoration:none}
.nav-links{margin-left:auto;display:flex;gap:4px}
.nav-links a{padding:10px 18px;border-radius:10px;text-decoration:none;font-size:0.88rem;font-weight:600;color:var(--t2);transition:all 0.2s}
.nav-links a:hover{background:#f3f4f6;color:var(--text)}
.nav-links a.active{background:#ede9fe;color:var(--p1)}

.hero{background:linear-gradient(135deg,#1e1b4b,#4f46e5);color:#fff;padding:40px 24px;text-align:center}
.hero h1{font-size:1.8rem;font-weight:800}.hero p{opacity:0.8;font-size:0.9rem;margin-top:6px}
.hero-stats{display:flex;gap:32px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.hs-num{font-size:2rem;font-weight:900}.hs-lbl{font-size:0.75rem;opacity:0.65}

.container{max-width:1000px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{padding:10px 22px;border-radius:10px;border:2px solid var(--bdr);background:var(--card);cursor:pointer;font-weight:700;font-size:0.9rem;font-family:var(--font);transition:all 0.2s}
.tab-btn.active{background:var(--p1);color:#fff;border-color:var(--p1)}

.school-grid{display:flex;flex-direction:column;gap:20px}
.school-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border:1px solid var(--bdr)}
.school-header{background:linear-gradient(135deg,#1e1b4b,#4338ca);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
.school-header h2{font-size:1.2rem}.school-header .count{background:rgba(255,255,255,0.2);padding:4px 14px;border-radius:14px;font-size:0.8rem}
.school-body{padding:12px}
.file-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;cursor:pointer;transition:all 0.15s}
.file-row:hover{background:#f8f9ff}
.file-row .ficon{font-size:1.3rem;flex-shrink:0;width:32px;text-align:center}
.file-row .finfo{flex:1;min-width:0}
.file-row .fname{font-weight:600;font-size:0.9rem}
.file-row .fmeta{font-size:0.75rem;color:var(--t2)}
.file-row .fbtns{display:flex;gap:6px;flex-shrink:0}
.btn-xs{padding:4px 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;font-size:0.7rem;font-weight:600;font-family:var(--font);text-decoration:none;color:var(--text)}
.btn-xs:hover{background:#f3f4f6}
.btn-xs.primary{background:var(--p1);color:#fff;border-color:var(--p1)}
.btn-xs.green{background:var(--g1);color:#fff;border-color:var(--g1)}

.category-section{margin-top:32px}
.category-section h3{font-size:1.1rem;margin-bottom:12px;color:var(--t2)}

.preview-panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:28px;margin-top:16px;display:none}
.preview-panel.show{display:block}
.preview-toolbar{display:flex;gap:8px;margin-bottom:16px}
.preview-content{line-height:1.85;font-size:0.94rem}
.preview-content h1,.preview-content h2,.preview-content h3{margin:1.2em 0 0.5em}
.preview-content h1{font-size:1.5rem}.preview-content h2{font-size:1.2rem}
.preview-content table{border-collapse:collapse;width:100%;margin:12px 0;font-size:0.88rem}
.preview-content th,.preview-content td{border:1px solid var(--bdr);padding:8px 12px}
.preview-content th{background:#f9fafb;font-weight:700}
.preview-content code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:0.85rem}
.preview-content blockquote{border-left:3px solid var(--p1);padding:4px 16px;margin:12px 0;background:#f8f9fa}

.empty{text-align:center;padding:60px;color:var(--t2)}.empty .icon{font-size:3rem}
@media(max-width:768px){.container{padding:12px}.school-header{flex-direction:column;gap:8px;text-align:center}.fbtns{flex-direction:column}}
@media print{body{background:#fff}.navbar,.hero,.tabs{display:none}.preview-panel{box-shadow:none;padding:16px}.container{padding:0}}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">&#9881; 保研skill</a>
  <div class="nav-links">
    <a href="index.html">首页</a><a href="practice.html">面试练习</a><a href="notices.html">通知看板</a><a href="results.html" class="active">成果中心</a>
  </div>
</nav>

<div class="hero">
  <h1>&#128194; 成果中心</h1>
  <p>按学校组织 · 每校全套申请材料 · HTML预览 · PDF打印</p>
  <div class="hero-stats">
    <div><div class="hs-num" id="stat-schools">0</div><div class="hs-lbl">已备学校</div></div>
    <div><div class="hs-num" id="stat-files">0</div><div class="hs-lbl">生成文件</div></div>
    <div><div class="hs-num" id="stat-html">0</div><div class="hs-lbl">可打印网页</div></div>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('school')">&#127979; 按学校</button>
    <button class="tab-btn" onclick="switchTab('type')">&#128193; 按类型</button>
  </div>

  <div id="school-view"></div>
  <div id="type-view" style="display:none"></div>

  <div id="generic-section" class="category-section"></div>

  <div class="preview-panel" id="preview">
    <div class="preview-toolbar">
      <button class="btn-xs" onclick="closePreview()">&#8592; 返回</button>
      <button class="btn-xs primary" onclick="copyContent()">&#128203; 复制</button>
      <button class="btn-xs green" onclick="openHTML()">&#127760; 网页版</button>
      <button class="btn-xs primary" onclick="printPDF()">&#128424; 打印PDF</button>
      <span id="preview-title" style="margin-left:auto;font-size:0.85rem;color:var(--t2)"></span>
    </div>
    <div class="preview-content" id="preview-content"></div>
  </div>
</div>

<script>
const ICONS={resume:'&#128196;',questions:'&#127908;',ps:'&#128220;',email:'&#9993;',recommend:'&#128231;',exam:'&#128214;',compare:'&#9878;'};
const LABELS={resume:'简历',questions:'面试题',ps:'个人陈述',email:'导师邮件/列表',recommend:'推荐信',exam:'专业课复习',compare:'Offer对比'};
let allFiles=[],currentTab='school',currentContent=null,currentHtmlPath=null;

async function init(){
  try{const r=await fetch('/api/results');const d=await r.json();allFiles=d.files||[];updateStats();renderAll()}catch(e){document.getElementById('school-view').innerHTML='<div class="empty"><div class="icon">&#128683;</div><h3>服务未连接</h3><p>请先运行 /保研 serve</p></div>'}
}
function updateStats(){
  const schools=new Set(allFiles.filter(f=>f.school).map(f=>f.school));
  document.getElementById('stat-schools').textContent=schools.size;
  document.getElementById('stat-files').textContent=allFiles.length;
  document.getElementById('stat-html').textContent=allFiles.filter(f=>f.html).length;
}
function switchTab(t){currentTab=t;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.tab-btn:nth-child(${t==='school'?1:2})`)?.classList.add('active');renderAll()}
function renderAll(){
  document.getElementById('school-view').style.display=currentTab==='school'?'block':'none';
  document.getElementById('type-view').style.display=currentTab==='school'?'none':'block';
  if(currentTab==='school') renderSchoolView(); else renderTypeView();
  renderGeneric();
}
function renderSchoolView(){
  const bySchool={};
  allFiles.forEach(f=>{if(f.school){if(!bySchool[f.school])bySchool[f.school]=[];bySchool[f.school].push(f)}});
  const order=['上交','清华','浙大','华科','哈工深','同济','西交','北大','哈工大','中科大','北航','北理','大工','天大','西工大','东大','华工','重大'];
  let h='<div class="school-grid">';
  for(const sn of order){if(!bySchool[sn])continue;const files=bySchool[sn];const cats=new Set(files.map(f=>f.category));
    h+=`<div class="school-card"><div class="school-header"><h2>&#127979; ${sn} · ${files.length} 份材料</h2><div class="count">${[...cats].map(c=>LABELS[c]||c).join(' · ')}</div></div><div class="school-body">`;
    files.forEach(f=>{const safe=f.path.replace(/\\/g,'/');const htmlP=safe.replace(/\.md$/,'.html');
      h+=`<div class="file-row"><span class="ficon">${ICONS[f.category]||'&#128196;'}</span><div class="finfo"><div class="fname">${f.name}</div><div class="fmeta">${LABELS[f.category]||f.category} · ${f.size||''}${f.html?' · &#9989; 可打印':''}</div></div><div class="fbtns"><button class="btn-xs primary" onclick="preview('${safe.replace(/'/g,"\\'")}')">&#128065; 预览</button>${f.html?`<a href="${f.html}" target="_blank" class="btn-xs green">&#127760;</a>`:''}</div></div>`});
    h+='</div></div>';}
  h+='</div>';
  if(Object.keys(bySchool).length===0)h='<div class="empty"><div class="icon">&#128221;</div><h3>暂无学校材料</h3><p>使用 /保研 ps 和 /保研 email 为各学校生成材料</p></div>';
  document.getElementById('school-view').innerHTML=h;
}
function renderTypeView(){
  const byType={};
  allFiles.forEach(f=>{if(!byType[f.category])byType[f.category]=[];byType[f.category].push(f)});
  let h='<div class="school-grid">';
  for(const[ck,label]of Object.entries(LABELS)){const files=byType[ck];if(!files||!files.length)continue;
    h+=`<div class="school-card"><div class="school-header"><h2>${ICONS[ck]||''} ${label} · ${files.length} 份</h2></div><div class="school-body">`;
    files.forEach(f=>{const safe=f.path.replace(/\\/g,'/');const htmlP=safe.replace(/\.md$/,'.html');
      h+=`<div class="file-row"><span class="ficon">${f.school?'&#127979;':'&#128196;'}</span><div class="finfo"><div class="fname">${f.school?f.school+' · ':''}${f.name}</div><div class="fmeta">${f.size||''}${f.html?' · &#9989;':''}</div></div><div class="fbtns"><button class="btn-xs primary" onclick="preview('${safe.replace(/'/g,"\\'")}')">&#128065;</button>${f.html?`<a href="${f.html}" target="_blank" class="btn-xs green">&#127760;</a>`:''}</div></div>`});
    h+='</div></div>';}
  h+='</div>';
  document.getElementById('type-view').innerHTML=h;
}
function renderGeneric(){
  const generic=allFiles.filter(f=>!f.school);
  if(!generic.length)return;
  let h=`<div class="category-section"><h3>&#128194; 通用材料（非学校专属）</h3><div class="school-grid">`;
  generic.forEach(f=>{const safe=f.path.replace(/\\/g,'/');
    h+=`<div class="file-row" style="background:var(--card);padding:12px 16px;border-radius:10px;margin-bottom:4px"><span class="ficon">${ICONS[f.category]||'&#128196;'}</span><div class="finfo"><div class="fname">${f.name}</div><div class="fmeta">${LABELS[f.category]||f.category} · ${f.size||''}</div></div><div class="fbtns"><button class="btn-xs primary" onclick="preview('${safe.replace(/'/g,"\\'")}')">&#128065;</button></div></div>`});
  h+='</div></div>';
  document.getElementById('generic-section').innerHTML=h;
}

async function preview(path){
  currentContent=null;currentHtmlPath=path.replace(/\.md$/,'.html');
  try{const r=await fetch(`/api/results/content?path=${encodeURIComponent(path)}`);const d=await r.json();currentContent=d.content;document.getElementById('preview-title').textContent=d.name||'';document.getElementById('preview-content').innerHTML=md2html(d.content||'');document.getElementById('preview').classList.add('show');document.getElementById('preview').scrollIntoView({behavior:'smooth'})}catch(e){alert('加载失败')}
}
function closePreview(){document.getElementById('preview').classList.remove('show');currentContent=null;currentHtmlPath=null}
function copyContent(){if(!currentContent)return;navigator.clipboard.writeText(currentContent).then(()=>{const b=document.querySelector('.preview-toolbar .btn-xs.primary');b.textContent='&#9989; 已复制';setTimeout(()=>b.textContent='&#128203; 复制',2000)})}
function openHTML(){if(currentHtmlPath){const parts=currentHtmlPath.split('/');const encoded=parts.map(p=>encodeURIComponent(p)).join('/');window.open(encoded,'_blank')}}
function printPDF(){if(!currentContent)return;const w=window.open('','_blank');w.document.write(`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Doc</title><style>body{font-family:"Microsoft YaHei",sans-serif;line-height:1.8;max-width:750px;margin:40px auto;padding:20px;color:#1a1a2e}h1{font-size:1.5rem}h2{font-size:1.25rem}h3{font-size:1.1rem}table{border-collapse:collapse;width:100%;margin:12px 0}th,td{border:1px solid #ddd;padding:8px 12px}th{background:#f5f5f5}code{background:#f0f0f0;padding:2px 6px;border-radius:4px}@media print{body{margin:0;padding:15px}}</style></head><body>${md2html(currentContent)}</body></html>`);w.document.close();setTimeout(()=>w.print(),500)}
function md2html(t){
  let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/(\|.+\|\n)+/g,m=>{let rows=m.trim().split('\n');if(rows.length<2)return m;let html='<table>';rows.forEach((row,i)=>{if(i===1&&/^[\|\s\-:]+$/.test(row))return;let cells=row.split('|').filter(c=>c.trim());let tag=i===0?'th':'td';html+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>'});html+='</table>';return html});
  h=h.replace(/\n\n/g,'</p><p>');h=h.replace(/\n/g,'<br>');h='<p>'+h+'</p>';h=h.replace(/<p><\/p>/g,'');return h;
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
